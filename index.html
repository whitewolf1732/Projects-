<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click to Display Name</title>
</head>
<body>
    <h1 id="display-name">Hello!</h1>
    <button id="fetch-name">Click Me</button>

    <script>
        // Add a click event listener to the button
        document.getElementById('fetch-name').addEventListener('click', () => {
            fetch('http://localhost:5000/api/name')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('display-name').innerText = `Hello, ${data.name}!`;
                })
                .catch(error => console.error('Error fetching name:', error));
        });
    </script>
</body>
</html>
